<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DORA Metrics - {{JOB_NAME}}</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 2rem;
            background: #f9fafb;
        }

        h1 {
            color: #2c3e50;
        }

        .card {
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 0.7rem;
        }

        th {
            background: #f2f2f2;
        }

        .value {
            font-weight: bold;
            color: #27ae60;
        }
    </style>
</head>
<body>

    <h1>📊 DORA Metrics - {{JOB_NAME}}</h1>

    <div class="card">
        <table>
            <tr>
                <th>Métrica</th>
                <th>Valor</th>
            </tr>
            <tr>
                <td>Lead Time</td>
                <td class="value">{{LEAD_TIME}}</td>
            </tr>
            <tr>
                <td>Commit Time</td>
                <td>{{COMMIT_TIME}}</td>
            </tr>
            <tr>
                <td>Deploy Time</td>
                <td>{{DEPLOY_TIME}}</td>
            </tr>
        </table>
    </div>

    <p>Generado el {{GENERATED_AT}}</p>

</body>
</html>
