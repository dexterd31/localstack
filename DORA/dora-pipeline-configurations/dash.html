<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DORA Metrics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #0f172a;
            color: #e5e7eb;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        .metric {
            font-size: 24px;
            font-weight: bold;
        }

        .small {
            font-size: 12px;
            color: #94a3b8;
        }

        canvas {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>📊 Métricas DORA - {{view_name}}</h1>

<div class="grid">

    <!-- RESUMEN -->
    <div class="card">
        <h3>Resumen</h3>

        <p>Deployments</p>
        <div class="metric">{{deployments}}</div>

        <p>Failure Rate</p>
        <div class="metric">{{failure_rate}}%</div>

        <p>Total Builds</p>
        <div class="metric">{{total_builds}}</div>

        <p>Total Jobs</p>
        <div class="metric">{{total_jobs}}</div>
    </div>

    <!-- DONUT -->
    <div class="card">
        <h3>Nivel de Desempeño</h3>
        <canvas id="donutChart"></canvas>
    </div>

    <!-- COMPARATIVA -->
    <div class="card">
        <h3>Comparativa por País</h3>
        <canvas id="barChart"></canvas>
    </div>

    <!-- EVOLUCIÓN -->
    <div class="card" style="grid-column: span 2;">
        <h3>Evolución de Deploys</h3>
        <canvas id="lineChart"></canvas>
    </div>

    <!-- DETALLE -->
    <div class="card">
        <h3>Detalle</h3>
        <p>Deployments: {{deployments}}</p>
        <p>Failure Rate: {{failure_rate}}%</p>
    </div>

</div>

<script>
    // 🔥 DATA INYECTADA
    const deploysPerDay = {{deploys_per_day}};
    const allData = {{all_data}};

    // =============================
    // 📈 LINE CHART
    // =============================
    new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: {
            labels: Object.keys(deploysPerDay),
            datasets: [{
                label: 'Deploys',
                data: Object.values(deploysPerDay),
                borderWidth: 2
            }]
        }
    });

    // =============================
    // 🍩 DONUT (clasificación simple)
    // =============================
    new Chart(document.getElementById('donutChart'), {
        type: 'doughnut',
        data: {
            labels: ['Success', 'Failed'],
            datasets: [{
                data: [
                    {{deployments}},
                    {{failed}}
                ]
            }]
        }
    });

    // =============================
    // 📊 BAR (comparativa)
    // =============================
    const labels = allData.map(x => x.view);
    const values = allData.map(x => x.deployments);

    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Deployments',
                data: values
            }]
        }
    });

</script>

</body>
</html>
